
<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Échange de compétences</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
<div class="container">

<a class="navbar-brand" href="{% url 'app:home' %}">
Échange de compétences

</a>

<a class="navbar-brand" href="{% url 'app:home' %}">
Accueil

</a>

<div>

<a class="btn btn-light me-2" href="{% url 'app:skills_list' %}">
Compétences
</a>

{% if user.is_authenticated %}

<a class="btn btn-light me-2" href="{% url 'app:my_skills' %}">
Mes compétences
</a>

<a class="btn btn-light me-2" href="{% url 'app:create_request' %}">
Demander de l'aide
</a>

<a class="btn btn-light me-2" href="{% url 'app:request_available' %}">
Demandes disponibles
</a>

<form action="{% url 'logout' %}" method="post" class="d-inline">
{% csrf_token %}
<button class="btn btn-danger">Déconnexion</button>
</form>

{% else %}

<a class="btn btn-light" href="{% url 'login' %}">
Connexion
</a>

{% endif %}

</div>

</div>
</nav>


<div class="container mt-4">

{% block content %}

{% endblock %}

</div>

<footer class="text-center mt-5 mb-3 text-muted">
PLATEFORME D'ECHANGE DE COMPETENCES
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
